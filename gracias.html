<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>¡Gracias! — Agent</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@700;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/reset.css" />
  <link rel="stylesheet" href="css/variables.css" />
  <style>
    body {
      font-family: var(--font-body);
      background: var(--clr-bg);
      color: var(--clr-text);
      min-height: 100svh;
      display: grid;
      place-items: center;
      padding: 2rem;
      text-align: center;
    }
    .card {
      max-width: 480px;
      background: var(--clr-surface);
      border: 1px solid var(--clr-border);
      border-radius: var(--radius-lg);
      padding: var(--space-12) var(--space-8);
    }
    .emoji { font-size: 4rem; margin-bottom: var(--space-6); }
    h1 {
      font-family: var(--font-heading);
      font-size: var(--fs-2xl);
      font-weight: var(--fw-black);
      color: #fff;
      margin-bottom: var(--space-4);
    }
    p { color: var(--clr-text-muted); line-height: 1.7; margin-bottom: var(--space-8); }
    .btn {
      display: inline-flex; align-items: center; gap: var(--space-2);
      padding: 0.85rem 1.5rem; border-radius: var(--radius-full);
      background: var(--clr-wa); color: #fff;
      font-weight: var(--fw-semibold); font-size: var(--fs-base);
      text-decoration: none;
      box-shadow: 0 4px 20px rgba(37,211,102,0.35);
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="emoji">🎉</div>
    <h1>¡Recibí tu mensaje!</h1>
    <p>Gracias por contactarme. Te responderé por WhatsApp en menos de 1 hora con toda la información que necesitas.</p>
    <a href="https://wa.me/51933863899?text=Hola%20Agent%2C%20acabo%20de%20enviar%20el%20formulario%20y%20me%20gustar%C3%ADa%20hablar%20sobre%20mi%20web." target="_blank" rel="noopener">
      💬 Escríbeme ahora en WhatsApp
    </a>
  </div>
</body>
</html>
