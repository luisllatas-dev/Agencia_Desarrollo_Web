# netlify.toml — Agent Web Agency
# Configuración de deploy y headers de seguridad

[build]
  publish = "."

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options            = "DENY"
    X-Content-Type-Options     = "nosniff"
    Referrer-Policy            = "strict-origin-when-cross-origin"
    Permissions-Policy         = "camera=(), microphone=(), geolocation=()"

[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Redirigir www → sin www
[[redirects]]
  from = "https://www.agentwebchiclayo.com/*"
  to   = "https://agentwebchiclayo.com/:splat"
  status = 301
  force  = true
